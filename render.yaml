services:
  - type: web
    name: intellistock
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: CORS_ORIGIN
        value: "https://intellistock.online"
      - key: APP_URL
        value: "https://intellistock.online"