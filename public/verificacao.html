<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Verificação em duas etapas | IntelliStock</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&family=Sora:wght@600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f3f7f7;
      --ink: #122127;
      --muted: #5d6b70;
      --brand: #0e8f83;
      --brand-strong: #096b62;
      --accent: #ee7f3b;
      --line: rgba(18, 33, 39, 0.1);
      --shadow: 0 20px 45px rgba(9, 41, 49, 0.12);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Manrope', sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 8% 5%, rgba(14, 143, 131, 0.18), transparent 28%),
        radial-gradient(circle at 95% 10%, rgba(238, 127, 59, 0.16), transparent 24%),
        linear-gradient(180deg, #f8fbfb 0%, var(--bg) 75%);
      min-height: 100vh;
      overflow-x: hidden;
    }

    .shell { width: min(1140px, 94%); margin: 0 auto; }

    header {
      position: sticky;
      top: 0;
      z-index: 20;
      backdrop-filter: blur(8px);
      background: rgba(248, 251, 251, 0.78);
      border-bottom: 1px solid var(--line);
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 0;
      gap: 20px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
      color: var(--ink);
      font-family: 'Sora', sans-serif;
      font-weight: 700;
      letter-spacing: 0.2px;
    }

    .brand-badge {
      width: 34px;
      height: 34px;
      border-radius: 10px;
      display: grid;
      place-items: center;
      background: linear-gradient(145deg, var(--brand), #0fb8a9);
      color: #fff;
      font-weight: 800;
    }

    nav { display: flex; align-items: center; flex-wrap: wrap; gap: 10px; }

    nav a {
      text-decoration: none;
      color: var(--ink);
      padding: 9px 13px;
      border-radius: 999px;
      font-size: 0.95rem;
      font-weight: 600;
      transition: background 0.2s, color 0.2s;
    }

    nav a:hover, nav a.active {
      background: rgba(14, 143, 131, 0.13);
      color: var(--brand-strong);
    }

    main {
      padding: 60px 0 80px;
      display: flex;
      justify-content: center;
    }

    .card {
      width: min(480px, 100%);
      border: 1px solid var(--line);
      border-radius: 22px;
      background: linear-gradient(180deg, #ffffff, #f7fbfb);
      box-shadow: var(--shadow);
      padding: 36px 32px;
      text-align: center;
    }

    .shield-wrap {
      width: 60px;
      height: 60px;
      border-radius: 18px;
      display: grid;
      place-items: center;
      background: linear-gradient(145deg, var(--brand), #0fb8a9);
      color: #fff;
      margin: 0 auto 20px;
      box-shadow: 0 14px 30px rgba(14, 143, 131, 0.3);
    }

    h1 {
      font-family: 'Sora', sans-serif;
      font-size: 1.55rem;
      margin-bottom: 10px;
      line-height: 1.2;
    }

    .subtitle {
      color: var(--muted);
      line-height: 1.65;
      font-size: 0.95rem;
      margin-bottom: 22px;
    }

    .demo-box {
      border: 1px dashed rgba(14, 143, 131, 0.5);
      border-radius: 14px;
      padding: 14px 16px;
      background: rgba(14, 143, 131, 0.06);
      color: #0a4f47;
      margin-bottom: 24px;
      font-size: 0.88rem;
      line-height: 1.55;
      text-align: left;
    }

    .demo-box .demo-label {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 8px;
      font-weight: 700;
      font-size: 0.82rem;
      text-transform: uppercase;
      letter-spacing: 0.3px;
      color: var(--brand-strong);
    }

    .demo-code {
      font-size: 2rem;
      font-weight: 800;
      letter-spacing: 10px;
      display: block;
      text-align: center;
      font-family: 'Sora', sans-serif;
      color: var(--brand-strong);
      margin-top: 4px;
    }

    .form-feedback {
      display: none;
      border-radius: 10px;
      padding: 10px 12px;
      margin-bottom: 16px;
      font-size: 0.88rem;
      line-height: 1.45;
      text-align: left;
    }

    .form-feedback.error {
      display: block;
      color: #8b3a18;
      background: rgba(238, 127, 59, 0.16);
      border: 1px solid rgba(238, 127, 59, 0.38);
    }

    .form-feedback.success {
      display: block;
      color: #0f5f55;
      background: rgba(14, 143, 131, 0.14);
      border: 1px solid rgba(14, 143, 131, 0.38);
    }

    .otp-wrap {
      display: flex;
      gap: 10px;
      justify-content: center;
      margin-bottom: 20px;
    }

    .otp-box {
      width: 52px;
      height: 60px;
      border-radius: 13px;
      border: 1.5px solid var(--line);
      background: #fff;
      text-align: center;
      font-size: 1.5rem;
      font-weight: 800;
      font-family: 'Sora', sans-serif;
      color: var(--ink);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .otp-box:focus {
      border-color: rgba(14, 143, 131, 0.6);
      box-shadow: 0 0 0 4px rgba(14, 143, 131, 0.14);
    }

    .otp-box.filled {
      border-color: var(--brand);
      background: rgba(14, 143, 131, 0.04);
    }

    .timer {
      font-size: 0.88rem;
      color: var(--muted);
      margin-bottom: 20px;
    }

    .timer span {
      font-weight: 800;
      color: var(--brand-strong);
    }

    .timer.expired span { color: #c0392b; }

    .btn {
      border: 0;
      width: 100%;
      padding: 13px 18px;
      border-radius: 11px;
      font-weight: 800;
      font-size: 0.95rem;
      letter-spacing: 0.2px;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s, opacity 0.2s;
      color: #fff;
      background: linear-gradient(135deg, var(--brand), #0cac9c);
      box-shadow: 0 12px 26px rgba(14, 143, 131, 0.25);
      margin-bottom: 16px;
    }

    .btn:hover:not(:disabled) { transform: translateY(-2px); }
    .btn:disabled { opacity: 0.45; cursor: not-allowed; transform: none; }

    .footer-links {
      display: flex;
      justify-content: center;
      gap: 20px;
      font-size: 0.88rem;
      flex-wrap: wrap;
    }

    .footer-links a {
      color: var(--brand-strong);
      text-decoration: none;
      font-weight: 700;
    }

    .footer-links a:hover { text-decoration: underline; }


    .reveal-section {
      opacity: 0;
      transform: translateY(16px);
      transition: opacity 0.55s ease, transform 0.55s ease;
    }

    .reveal-section.visible {
      opacity: 1;
      transform: translateY(0);
    }

    @media (max-width: 1180px) {
      .topbar { align-items: flex-start; flex-direction: column; gap: 10px; }
      nav { width: 100%; flex-wrap: nowrap; overflow-x: auto; -webkit-overflow-scrolling: touch; padding-bottom: 4px; }
      nav a { white-space: nowrap; flex: 0 0 auto; }
    }

    @media (max-width: 520px) {
      .card { padding: 26px 18px; }
      .otp-box { width: 44px; height: 52px; font-size: 1.25rem; gap: 7px; }
      .otp-wrap { gap: 7px; }
    }

    @media (max-width: 380px) {
      .card { padding: 20px 12px; }
      .otp-box { width: 38px; height: 46px; font-size: 1.1rem; }
      .otp-wrap { gap: 5px; }
      h1 { font-size: 1.35rem; }
    }
  </style>
</head>
<body id="topo">
  <header>
    <div class="shell topbar">
      <a class="brand" href="/index.html">
        <span class="brand-badge">IS</span>
        <span>IntelliStock</span>
      </a>
      <nav>
        <a href="/index.html">Início</a>
        <a href="/login.html" class="active">Login</a>
        <a href="/index.html#histSection" onclick="sessionStorage.setItem('scrollToHist','1')">Veja na prática</a>
        <a href="/produtos.html">Planos</a>
      </nav>
    </div>
  </header>

  <main class="shell">
    <div class="card reveal-section">

      <div class="shield-wrap">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
        </svg>
      </div>

      <h1>Verificação em duas etapas</h1>
      <p class="subtitle" id="subtitleText">
        Digite o código de 6 dígitos para confirmar o acesso à plataforma.
      </p>

      <div class="demo-box" id="demoBox" style="display:none;">
        <div class="demo-label">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
          Modo demonstração — em produção seria enviado ao seu e-mail
        </div>
        <span class="demo-code" id="demoCode">------</span>
      </div>

      <div id="formFeedback" class="form-feedback"></div>

      <div class="otp-wrap" id="otpWrap">
        <input class="otp-box" type="text" maxlength="1" inputmode="numeric" pattern="[0-9]" autocomplete="one-time-code">
        <input class="otp-box" type="text" maxlength="1" inputmode="numeric" pattern="[0-9]">
        <input class="otp-box" type="text" maxlength="1" inputmode="numeric" pattern="[0-9]">
        <input class="otp-box" type="text" maxlength="1" inputmode="numeric" pattern="[0-9]">
        <input class="otp-box" type="text" maxlength="1" inputmode="numeric" pattern="[0-9]">
        <input class="otp-box" type="text" maxlength="1" inputmode="numeric" pattern="[0-9]">
      </div>

      <div class="timer" id="timerWrap">Código expira em <span id="timerVal">10:00</span></div>

      <button class="btn" id="confirmBtn" disabled>Confirmar acesso</button>

      <div class="footer-links">
        <a href="/login.html" id="reenviarBtn">Reenviar código</a>
        <a href="/login.html">Voltar ao login</a>
      </div>
    </div>
  </main>

  <script src="./js/auth-service.js"></script>

  <script>
    // ----- Validar sessão -----
    const session = JSON.parse(sessionStorage.getItem('is_2fa_session') || 'null');
    if (!session || !session.token_temp) {
      window.location.href = '/login.html';
    }

    // Personalizar saudação
    if (session && session.nome) {
      document.getElementById('subtitleText').textContent =
        `Olá, ${session.nome}! Digite o código de 6 dígitos para confirmar o acesso.`;
    }

    // Exibir código demo se disponível
    if (session && session.codigo_demo) {
      document.getElementById('demoBox').style.display = 'block';
      document.getElementById('demoCode').textContent = session.codigo_demo;
    }

    // ----- OTP Inputs -----
    const boxes = Array.from(document.querySelectorAll('.otp-box'));
    const confirmBtn = document.getElementById('confirmBtn');
    const feedback = document.getElementById('formFeedback');

    function getCode() {
      return boxes.map(b => b.value).join('');
    }

    function updateState() {
      const code = getCode();
      confirmBtn.disabled = code.length !== 6;
      boxes.forEach(b => b.classList.toggle('filled', b.value !== ''));
    }

    boxes.forEach((box, i) => {
      box.addEventListener('input', () => {
        box.value = box.value.replace(/\D/g, '').slice(-1);
        if (box.value && i < 5) boxes[i + 1].focus();
        updateState();
      });

      box.addEventListener('keydown', (e) => {
        if (e.key === 'Backspace' && !box.value && i > 0) {
          boxes[i - 1].value = '';
          boxes[i - 1].focus();
          updateState();
        }
        if (e.key === 'Enter' && getCode().length === 6) doVerify();
      });

      box.addEventListener('focus', () => box.select());
    });

    // Suporte a colar
    document.addEventListener('paste', (e) => {
      const text = (e.clipboardData || window.clipboardData).getData('text').replace(/\D/g, '');
      if (!text) return;
      e.preventDefault();
      text.split('').slice(0, 6).forEach((ch, i) => { if (boxes[i]) boxes[i].value = ch; });
      const next = Math.min(text.length, 5);
      boxes[next].focus();
      updateState();
    });

    // ----- Countdown timer -----
    let secondsLeft = 10 * 60;
    const timerVal = document.getElementById('timerVal');
    const timerWrap = document.getElementById('timerWrap');

    function fmt(s) {
      return `${Math.floor(s / 60).toString().padStart(2, '0')}:${(s % 60).toString().padStart(2, '0')}`;
    }

    timerVal.textContent = fmt(secondsLeft);

    const timerInterval = setInterval(() => {
      secondsLeft--;
      timerVal.textContent = fmt(secondsLeft);
      if (secondsLeft <= 60) timerWrap.querySelector('span').style.color = '#c0392b';
      if (secondsLeft <= 0) {
        clearInterval(timerInterval);
        timerWrap.classList.add('expired');
        timerWrap.innerHTML = 'Código expirado. <span>Solicite um novo.</span>';
        confirmBtn.disabled = true;
        boxes.forEach(b => b.disabled = true);
      }
    }, 1000);

    // ----- Verificar -----
    async function doVerify() {
      const code = getCode();
      if (code.length !== 6) return;

      feedback.className = 'form-feedback';
      confirmBtn.disabled = true;
      confirmBtn.textContent = 'Verificando...';

      try {
        const data = await window.AuthService.verify({ token_temp: session.token_temp, codigo: code });

        if (data.success) {
          clearInterval(timerInterval);
          feedback.textContent = `Acesso confirmado! Bem-vindo, ${data.usuario.nome}.`;
          feedback.classList.add('success');
          sessionStorage.setItem('is_usuario', JSON.stringify(data.usuario));
          sessionStorage.removeItem('is_2fa_session');
          setTimeout(() => { window.location.href = '/dashboard.html'; }, 1400);
        } else {
          feedback.textContent = data.message || 'Código incorreto.';
          feedback.classList.add('error');
          confirmBtn.disabled = false;
          confirmBtn.textContent = 'Confirmar acesso';
          boxes.forEach(b => { b.value = ''; b.classList.remove('filled'); });
          boxes[0].focus();
        }
      } catch (err) {
        feedback.textContent = 'Falha na verificação. Verifique se o modo API está disponível.';
        feedback.classList.add('error');
        confirmBtn.disabled = false;
        confirmBtn.textContent = 'Confirmar acesso';
      }
    }

    confirmBtn.addEventListener('click', doVerify);

    // ----- Animação de entrada -----
    setTimeout(() => document.querySelector('.reveal-section').classList.add('visible'), 60);

    // Foco automático no primeiro campo
    setTimeout(() => boxes[0].focus(), 300);
  </script>
</body>
</html>
